[project]
name = "signifypy-w3c"
version = "0.1.0"
description = "Edge-owned W3C VC-JWT and VP-JWT artifact helpers for SignifyPy wallets"
readme = "README.md"
requires-python = ">=3.12.6,<3.14"
license = { text = "Apache-2.0" }
authors = [
    { name = "Kent Bull", email = "kent@kentbull.com" }
]
dependencies = [
    "signifypy>=0.3.0",
    "vc-isomer>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/signifypy_w3c"]
