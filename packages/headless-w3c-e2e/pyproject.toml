[project]
name = "headless-w3c-e2e"
version = "0.1.0"
description = "Python-first headless W3C holder presentation E2E harness"
readme = "README.md"
requires-python = ">=3.12.6,<3.14"
license = { text = "Apache-2.0" }
authors = [
    { name = "Kent Bull", email = "kent@kentbull.com" }
]
dependencies = [
    "requests>=2,<3",
    "signifypy @ git+https://github.com/kentbull/signifypy.git@b11001d54f9d0d9b8b7a49c0e09307e6252db291",
    "signifypy-did-webs @ git+https://github.com/GLEIF-IT/w3c-crosswalk.git@6a38ca7f87deaa3be49173009aa9151704345503#subdirectory=packages/signifypy-did-webs",
    "signifypy-w3c>=0.1.0",
    "vc-isomer>=0.1.0",
]

[project.scripts]
headless-w3c-e2e = "headless_w3c_e2e.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/headless_w3c_e2e"]
