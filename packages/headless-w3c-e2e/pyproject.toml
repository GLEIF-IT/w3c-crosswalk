[project]
name = "headless-w3c-e2e"
version = "0.1.0"
description = "Python-first headless W3C holder presentation E2E harness"
readme = "README.md"
requires-python = ">=3.12.6,<3.14"
license = { text = "Apache-2.0" }
authors = [
    { name = "Kent Bull", email = "kent@kentbull.com" }
]
dependencies = [
    "requests>=2,<3",
    "signifypy>=0.4.2,<0.5.0",
    "signifypy-did-webs>=0.1.0,<0.2.0",
    "signifypy-w3c>=0.1.0,<0.2.0",
    "vc-isomer>=0.1.0,<0.2.0",
]

[project.urls]
Repository = "https://github.com/GLEIF-IT/w3c-crosswalk"
Issues = "https://github.com/GLEIF-IT/w3c-crosswalk/issues"

[project.scripts]
headless-w3c-e2e = "headless_w3c_e2e.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/headless_w3c_e2e"]
