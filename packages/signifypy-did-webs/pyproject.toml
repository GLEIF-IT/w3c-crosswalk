[project]
name = "signifypy-did-webs"
version = "0.1.0"
description = "Blocking did:webs setup helpers for SignifyPy wallets"
readme = "README.md"
requires-python = ">=3.12.6,<3.14"
license = { text = "Apache-2.0" }
authors = [
    { name = "Kent Bull", email = "kent@kentbull.com" }
]
dependencies = [
    "signifypy>=0.4.2,<0.5.0",
]

[project.urls]
Repository = "https://github.com/GLEIF-IT/w3c-crosswalk"
Issues = "https://github.com/GLEIF-IT/w3c-crosswalk/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/signifypy_did_webs"]
