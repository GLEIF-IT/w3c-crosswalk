# overall docker compose file for the full local setup:
#
# Issuer, Holder, Verifier components
# - Demo witnesses (only first three are used, wan, wes, and wil)
# - vLEI for vLEI-server schema hosting
# - keria
# - did:webs resolver
# - Verifier 1: isomer-python
# - Verifier 2: isomer-node
# - Verifier 3: isomer-go
# - Verifier dashboard: isomer-dashboard
# - Signify wallet: signify-react-ts
#
# Utility Containers
# - GEDA -> LE seeder: signifypy-seed (for `make local-seed` target)
# - signifypy-project: W3C Credential projector with Signifypy (for `make local-project` target)


services:
  witness-demo:
    image: ${WITNESS_IMAGE}
    entrypoint: ["kli"]
    command: ["witness", "demo", "--loglevel", "${WITNESS_LOGLEVEL:-INFO}"]
    ports:
      - "5642:5642"
      - "5643:5643"
      - "5644:5644"

  vlei:
    image: ${VLEI_IMAGE}
    volumes:
      - ../tests/integration/_assets/vlei/schema:/vLEI/schema:ro
      - ../tests/integration/_assets/vlei/samples/acdc:/vLEI/credentials:ro
    command:
      [
        "vLEI-server",
        "--http",
        "7723",
        "--schema-dir",
        "/vLEI/schema",
        "--cred-dir",
        "/vLEI/credentials",
        "--oobi-dir",
        "/vLEI/oobis",
      ]
    ports:
      - "7723:7723"

  keria:
    image: ${KERIA_IMAGE}
    volumes:
      - ./keria/local-witness-oobis.json:/keria/config/local-witness-oobis.json:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /tmp/keria-config/keri/cf
        cp /keria/config/local-witness-oobis.json /tmp/keria-config/keri/cf/local-witness-oobis.json
        exec keria start --config-dir /tmp/keria-config --config-file local-witness-oobis --loglevel ${KERIA_LOGLEVEL:-INFO}
    ports:
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      KERI_AGENT_CORS: "1"
      KERIA_DID_WEBS_ENABLED: "true"
      KERIA_DID_WEBS_PUBLIC_BASE_URL: ${DID_WEBS_PUBLIC_BASE_URL}
      KERIA_DID_WEBS_PATH: dws
      KERIA_DID_WEBS_REGISTRY_NAME_PREFIX: ${DID_WEBS_REGISTRY_NAME_PREFIX}
      KERIA_W3C_PROJECTION_ENABLED: "true"
      KERIA_W3C_PROJECTION_STATUS_BASE_URL: ${KERIA_STATUS_BASE_URL}
      KERIA_W3C_PROJECTION_VERIFIERS: ${KERIA_W3C_PROJECTION_VERIFIERS:-[{"id":"isomer-python-local","label":"Isomer Python","kind":"isomer-python-vc-jwt","verifyUrl":"http://isomer-python:8788/verify/vc"},{"id":"isomer-node-local","label":"Isomer Node","kind":"isomer-node-vc-jwt","verifyUrl":"http://isomer-node:8788/verify/vc"},{"id":"isomer-go-local","label":"Isomer Go","kind":"isomer-go-vc-jwt","verifyUrl":"http://isomer-go:8788/verify/vc"}]}
    depends_on:
      - witness-demo
    extra_hosts:
      - "host.docker.internal:host-gateway"

  did-webs-resolver:
    image: ${DID_WEBS_RESOLVER_IMAGE}
    entrypoint: []
    command:
      [
        "dws",
        "did",
        "webs",
        "resolver-service",
        "--name",
        "${DWS_RESOLVER_NAME:-dws}",
        "--config-dir",
        "/dws/config",
        "--config-file",
        "dws.json",
        "--http",
        "7678",
        "--did-path",
        "dws",
        "--loglevel",
        "${DWS_LOGLEVEL:-INFO}",
      ]
    ports:
      - "7678:7678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - keria

  isomer-python:
    image: ${ISOMER_PYTHON_IMAGE}
    ports:
      - "8788:8788"
    environment:
      ISOMER_RESOLVER_URL: ${ISOMER_RESOLVER_URL}
      ISOMER_WEBHOOK_URL: http://isomer-dashboard:8791/webhooks/presentations
      ISOMER_VERIFIER_ID: isomer-python
      ISOMER_VERIFIER_LABEL: Isomer Python
    depends_on:
      - did-webs-resolver
      - isomer-dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"

  isomer-node:
    image: ${ISOMER_NODE_IMAGE}
    ports:
      - "8789:8788"
    environment:
      ISOMER_RESOLVER_URL: ${ISOMER_RESOLVER_URL}
      ISOMER_WEBHOOK_URL: http://isomer-dashboard:8791/webhooks/presentations
      ISOMER_VERIFIER_ID: isomer-node
      ISOMER_VERIFIER_LABEL: Isomer Node
    depends_on:
      - did-webs-resolver
      - isomer-dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"

  isomer-go:
    image: ${ISOMER_GO_IMAGE}
    ports:
      - "8790:8788"
    environment:
      ISOMER_RESOLVER_URL: ${ISOMER_RESOLVER_URL}
      ISOMER_WEBHOOK_URL: http://isomer-dashboard:8791/webhooks/presentations
      ISOMER_VERIFIER_ID: isomer-go
      ISOMER_VERIFIER_LABEL: Isomer Go
    depends_on:
      - did-webs-resolver
      - isomer-dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"

  isomer-dashboard:
    image: ${ISOMER_DASHBOARD_IMAGE}
    ports:
      - "8791:8791"
    environment:
      ISOMER_DASHBOARD_HOST: 0.0.0.0
      ISOMER_DASHBOARD_PORT: 8791

  signify-react-ts:
    image: ${SIGNIFY_REACT_TS_IMAGE}
    ports:
      - "5177:5177"
    environment:
      VITE_KERIA_ADMIN_URL: ${KERIA_ADMIN_URL}
      VITE_KERIA_ROUTER_URL: ${KERIA_ROUTER_URL}
      VITE_KERIA_BOOT_URL: ${KERIA_BOOT_URL}
      VITE_VERIFIER_DASHBOARD_URL: http://127.0.0.1:8791
      VITE_OPERATION_TIMEOUT_MS: ${VITE_OPERATION_TIMEOUT_MS:-60000}
    depends_on:
      - keria
      - isomer-dashboard

  signifypy-seed:
    image: ${SIGNIFYPY_IMAGE}
    profiles: ["seed"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "python",
        "scripts/setup_vrd_projection_chain.py",
        "--admin-url",
        "http://keria:3901",
        "--boot-url",
        "http://keria:3903",
        "--schema-base-url",
        "http://vlei:7723",
        "--alias-prefix",
        "w3c-vrd",
        "--unwitnessed",
        "--output",
        "/workspace/.tmp/local-stack/w3c-vrd-chain-manifest.json",
      ]
    volumes:
      - ../.tmp/local-stack:/workspace/.tmp/local-stack
    depends_on:
      - keria
      - vlei

  signifypy-project:
    image: ${SIGNIFYPY_IMAGE}
    profiles: ["seed"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "python",
        "/workspace/scripts/local-stack/project_vrd_to_verifiers.py",
        "--manifest",
        "/workspace/.tmp/local-stack/w3c-vrd-chain-manifest.json",
        "--admin-url",
        "http://keria:3901",
        "--boot-url",
        "http://keria:3903",
        "--output",
        "/workspace/.tmp/local-stack/w3c-projection-results.json",
      ]
    volumes:
      - ../.tmp/local-stack:/workspace/.tmp/local-stack
      - ../scripts/local-stack:/workspace/scripts/local-stack:ro
    depends_on:
      - keria
      - isomer-python
      - isomer-node
      - isomer-go
