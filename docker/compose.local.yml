# overall docker compose file for the full local setup:
#
# Issuer, Holder, Verifier components
# - Demo witnesses (only first three are used, wan, wes, and wil)
# - vLEI for vLEI-server schema hosting
# - keria
# - did:webs resolver
# - Verifier 1: isomer-python
# - Verifier 2: isomer-node
# - Verifier 3: isomer-go
# - Verifier dashboard: isomer-dashboard
#
# Utility Containers
# - GEDA -> LE holder-presentation seeder: signifypy-seed
#   (for `make local-seed` target)

volumes:
  keria-data:
  witness-data:
  did-webs-resolver-data:
  isomer-python-operations:

services:
  witness-demo:
    image: ${WITNESS_IMAGE}
    entrypoint: ["kli"]
    command: ["witness", "demo", "--loglevel", "${WITNESS_LOGLEVEL:-INFO}"]
    volumes:
      - witness-data:/usr/local/var/keri
      - ./witness/check-witness-oobis.py:/usr/local/bin/check-witness-oobis.py:ro
      - ./witness/keri/cf/main/wan.json:/keripy/scripts/keri/cf/main/wan.json
      - ./witness/keri/cf/main/wil.json:/keripy/scripts/keri/cf/main/wil.json
      - ./witness/keri/cf/main/wes.json:/keripy/scripts/keri/cf/main/wes.json
      - ./witness/keri/cf/main/wan.json:/root/.keri/cf/main/wan.json
      - ./witness/keri/cf/main/wil.json:/root/.keri/cf/main/wil.json
      - ./witness/keri/cf/main/wes.json:/root/.keri/cf/main/wes.json
    ports:
      - "5642:5642"
      - "5643:5643"
      - "5644:5644"
    healthcheck:
      test: [ "CMD", "/keripy/venv/bin/python", "/usr/local/bin/check-witness-oobis.py" ]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 5s

  vlei:
    image: ${VLEI_IMAGE}
    volumes:
      - ../tests/integration/_assets/vlei/schema:/vLEI/schema:ro
      - ../tests/integration/_assets/vlei/samples/acdc:/vLEI/credentials:ro
    command:
      [
        "vLEI-server",
        "--http",
        "7723",
        "--schema-dir",
        "/vLEI/schema",
        "--cred-dir",
        "/vLEI/credentials",
        "--oobi-dir",
        "/vLEI/oobis",
      ]
    ports:
      - "7723:7723"

  keria:
    image: ${KERIA_IMAGE}
    volumes:
      - ./keria/local-witness-oobis.json:/keria/config/local-witness-oobis.json:ro
      - keria-data:/usr/local/var/keri
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /tmp/keria-config/keri/cf
        cp /keria/config/local-witness-oobis.json /tmp/keria-config/keri/cf/local-witness-oobis.json
        exec keria start --config-dir /tmp/keria-config --config-file local-witness-oobis --loglevel ${KERIA_LOGLEVEL:-INFO}
    ports:
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      KERI_AGENT_CORS: "1"
      KERIA_DID_WEBS_ENABLED: "true"
      KERIA_DID_WEBS_PUBLIC_BASE_URL: ${DID_WEBS_PUBLIC_BASE_URL}
      KERIA_DID_WEBS_PATH: dws
      KERIA_DID_WEBS_REGISTRY_NAME_PREFIX: ${DID_WEBS_REGISTRY_NAME_PREFIX}
      KERIA_W3C_ENABLED: "true"
      KERIA_W3C_STATUS_BASE_URL: ${KERIA_STATUS_BASE_URL}
      KERIA_W3C_SIGNAL_INTERVAL_SECONDS: ${KERIA_W3C_SIGNAL_INTERVAL_SECONDS:-5}
    depends_on:
      witness-demo:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  did-webs-resolver:
    image: ${DID_WEBS_RESOLVER_IMAGE}
    entrypoint: []
    volumes:
      - did-webs-resolver-data:/usr/local/var/keri
    command:
      [
        "dws",
        "did",
        "webs",
        "resolver-service",
        "--name",
        "${DWS_RESOLVER_NAME:-dws}",
        "--config-dir",
        "/dws/config",
        "--config-file",
        "dws.json",
        "--http",
        "7678",
        "--did-path",
        "dws",
        "--loglevel",
        "${DWS_LOGLEVEL:-INFO}",
      ]
    ports:
      - "7678:7678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - keria

  isomer-python:
    image: ${ISOMER_PYTHON_IMAGE}
    volumes:
      - isomer-python-operations:/data/operations
    ports:
      - "8788:8788"
    environment:
      ISOMER_RESOLVER_URL: ${ISOMER_RESOLVER_URL}
      ISOMER_WEBHOOK_URL: http://isomer-dashboard:8791/webhooks/presentations
      ISOMER_VERIFIER_ID: isomer-python
      ISOMER_VERIFIER_LABEL: Isomer Python
    depends_on:
      - did-webs-resolver
      - isomer-dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"

  isomer-node:
    image: ${ISOMER_NODE_IMAGE}
    ports:
      - "8789:8788"
    environment:
      ISOMER_RESOLVER_URL: ${ISOMER_RESOLVER_URL}
      ISOMER_WEBHOOK_URL: http://isomer-dashboard:8791/webhooks/presentations
      ISOMER_VERIFIER_ID: isomer-node
      ISOMER_VERIFIER_LABEL: Isomer Node
    depends_on:
      - did-webs-resolver
      - isomer-dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"

  isomer-go:
    image: ${ISOMER_GO_IMAGE}
    ports:
      - "8790:8788"
    environment:
      ISOMER_RESOLVER_URL: ${ISOMER_RESOLVER_URL}
      ISOMER_WEBHOOK_URL: http://isomer-dashboard:8791/webhooks/presentations
      ISOMER_VERIFIER_ID: isomer-go
      ISOMER_VERIFIER_LABEL: Isomer Go
    depends_on:
      - did-webs-resolver
      - isomer-dashboard
    extra_hosts:
      - "host.docker.internal:host-gateway"

  isomer-dashboard:
    image: ${ISOMER_DASHBOARD_IMAGE}
    ports:
      - "8791:8791"
    environment:
      ISOMER_DASHBOARD_HOST: 0.0.0.0
      ISOMER_DASHBOARD_PORT: 8791

  signifypy-seed:
    image: ${SIGNIFYPY_IMAGE}
    profiles: ["seed"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "python",
        "scripts/setup_vrd_holder_presentation_chain.py",
        "--admin-url",
        "http://keria:3901",
        "--boot-url",
        "http://keria:3903",
        "--schema-base-url",
        "http://vlei:7723",
        "--alias-prefix",
        "w3c-vrd",
        "--witness",
        "BBilc4-L3tFUnfM_wJr4S4OJanAv_VmF_dJNN6vkf2Ha",
        "--output",
        "/workspace/.tmp/local-stack/w3c-vrd-chain-manifest.json",
      ]
    volumes:
      - ../.tmp/local-stack:/workspace/.tmp/local-stack
    depends_on:
      - keria
      - vlei
